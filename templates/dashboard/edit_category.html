{% extends 'base.html' %}

{% block content %}

<div class="row">
    {% include 'dashboard/sidebar.html' %}

    <div class="col-md-9">
        <div class="card shadow-sm" style="max-width: 500px;">
            <div class="card-header bg-warning">
                <h4 class="mb-0"><i class="fa fa-edit"></i> Edit Category</h4>
            </div>
            <div class="card-body">
                {% if form.errors %}
                <div class="alert alert-danger">
                    {% for field in form %}
                    {% for error in field.errors %}
                    <p>{{ error }}</p>
                    {% endfor %}
                    {% endfor %}
                </div>
                {% endif %}

                <form action="{% url 'edit_category' category.id %}" method="POST">
                    {% csrf_token %}

                    <div class="form-group mb-4">
                        <label for="id_name" class="form-label font-weight-bold">Category Name</label>
                        {{ form.name }}
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'categories' %}" class="btn btn-secondary"><i class="fa fa-arrow-left"></i>
                            Back</a>
                        <button type="submit" class="btn btn-warning"><i class="fa fa-save"></i> Update
                            Category</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
