{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-center">
                <h4 class="mb-0"><i class="fa fa-sign-in"></i> Login</h4>
            </div>
            <div class="card-body p-4">
                {% if form.errors %}
                <div class="alert alert-danger">
                    <p class="mb-0">Invalid username or password</p>
                </div>
                {% endif %}

                <form action="{% url 'login' %}" method="POST">
                    {% csrf_token %}

                    <div class="form-group mb-3">
                        <label for="id_username" class="form-label font-weight-bold">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>

                    <div class="form-group mb-4">
                        <label for="id_password" class="form-label font-weight-bold">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-warning btn-block w-100"><i class="fa fa-sign-in"></i>
                        Login</button>
                </form>

                <hr>
                <p class="text-center mb-0">Don't have an account? <a href="{% url 'register' %}"
                        class="text-warning">Register here</a></p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
