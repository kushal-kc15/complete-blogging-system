<article class="post-card">
  {% if post.featured_image %}
  <a href="{% url 'Blog_detail' post.slug %}" class="post-card-image">
    <img src="{{ post.featured_image.url }}" alt="{{ post.title }}">
  </a>
  {% endif %}
  <div class="post-card-body">
    <a href="{% url 'posts_by_category' post.category.id %}" class="post-category-pill">{{ post.category }}</a>
    <h3><a href="{% url 'Blog_detail' post.slug %}">{{ post.title }}</a></h3>
    <p>{{ post.short_description|truncatewords:20 }}</p>
    <div class="post-meta-line">
      <span>{{ post.created_at|timesince }} ago</span>
      <span>{{ post.author }}</span>
      <span><i class="fa fa-clock-o"></i> {{ post.reading_time }} min</span>
    </div>
  </div>
</article>
