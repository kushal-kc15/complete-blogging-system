<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>404 - Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f9f9f9;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 420px;
      padding: 20px;
    }

    h1 {
      font-size: 6rem;
      margin: 0;
    }

    h2 {
      font-size: 2rem;
      margin: 10px 0;
    }

    p {
      color: #555;
      margin: 15px 0 30px;
    }

    a {
      display: inline-block;
      padding: 12px 24px;
      border: 1px solid #000;
      border-radius: 8px;
      text-decoration: none;
      color: #000;
      font-weight: 600;
    }

    a:hover {
      background: #000;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Oops! The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Go back home</a>
  </div>
</body>
</html>
